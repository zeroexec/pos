<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }

        body { background: transparent; padding: 20px; color: #1f2937; }
        @media (min-width: 768px) { body { padding: 40px; } }

        /* HEADER */
        .header-flex { display: flex; flex-direction: column; gap: 20px; margin-bottom: 35px; }
        @media (min-width: 768px) { .header-flex { flex-direction: row; justify-content: space-between; align-items: center; } }

        h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .controls { display: flex; gap: 12px; flex-wrap: wrap; }

        .search-wrapper { position: relative; flex: 1; min-width: 200px; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        .search-input {
            padding: 12px 15px 12px 40px; border-radius: 14px;
            border: 1px solid #e5e7eb; width: 100%; outline: none;
            transition: 0.3s; font-size: 14px; background: white;
        }

        .btn {
            padding: 12px 20px; border-radius: 14px; border: none;
            font-weight: 700; font-size: 14px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: #6366f1; color: white; }

        /* TABLE */
        .table-container { background: white; border-radius: 24px; border: 1px solid #f3f4f6; overflow-x: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f9fafb; padding: 20px; text-align: left; font-size: 11px; font-weight: 800; color: #9ca3af; text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid #f9fafb; font-size: 14px; font-weight: 600; }
        
        .prod-info { display: flex; align-items: center; gap: 12px; }
        .prod-img { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; background: #eee; border: 1px solid #f3f4f6; }
        
        .stock-badge { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; }
        .in-stock { background: #ecfdf5; color: #10b981; }
        .low-stock { background: #fff7ed; color: #f97316; }
        .out-stock { background: #fef2f2; color: #ef4444; }

        .btn-icon { width: 35px; height: 35px; border-radius: 10px; border: 1px solid #f3f4f6; background: white; cursor: pointer; transition: 0.2s; color: #6b7280; }
        .btn-icon:hover { color: #6366f1; background: #f5f3ff; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal {
            background: white; padding: 30px; border-radius: 28px;
            width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: #9ca3af; text-transform: uppercase; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e5e7eb; outline: none; font-weight: 600; font-size: 14px; }

        .template-btn { background: #f5f3ff; color: #6366f1; border: 1px dashed #c4b5fd; padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; margin-bottom: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="header-flex">
        <div>
            <h1>Inventory Stok</h1>
            <p style="color: #6b7280; font-size: 14px; margin-top: 5px;">Data produk dan ketersediaan barang.</p>
        </div>
        <div class="controls">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Cari barang..." onkeyup="renderTable()">
            </div>
            <button class="btn btn-primary" onclick="openModal('add')">
                <i class="fa-solid fa-plus"></i> Tambah Produk
            </button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Produk</th>
                    <th>Kategori</th>
                    <th>Harga</th>
                    <th>Stok</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle" style="margin-bottom: 20px; letter-spacing: -1px;">Tambah Produk</h2>
            
            <button class="template-btn" onclick="useTemplate()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Gunakan Template Data (Cepat)
            </button>

            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Nama Produk</label>
                    <input type="text" id="prodName" placeholder="Masukkan nama barang">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="prodCat">
                        <option value="Minuman">Minuman</option>
                        <option value="Makanan">Makanan</option>
                        <option value="Bahan Baku">Bahan Baku</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" id="prodPrice" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Stok Awal</label>
                    <input type="number" id="prodStock" placeholder="0">
                </div>
                <div class="form-group full-width">
                    <label>Link Gambar (URL)</label>
                    <input type="text" id="prodImg" placeholder="https://images.unsplash.com/...">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" style="flex:1; background:#f3f4f6; justify-content:center;" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary" style="flex:1; justify-content:center;" onclick="saveData()">Simpan Data</button>
            </div>
        </div>
    </div>

    <script>
        let inventory = [
            { id: 1, name: 'Americano Ice', cat: 'Minuman', price: 25000, stock: 50, img: 'https://images.unsplash.com/photo-1551033406-611cf9a28f67?w=200&fit=crop' },
            { id: 2, name: 'Butter Croissant', cat: 'Makanan', price: 18000, stock: 5, img: 'https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=200&fit=crop' },
            { id: 3, name: 'Caramel Syrup', cat: 'Bahan Baku', price: 120000, stock: 0, img: 'https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=200&fit=crop' }
        ];

        function renderTable() {
            const body = document.getElementById('inventoryBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            body.innerHTML = '';
            
            const filtered = inventory.filter(i => i.name.toLowerCase().includes(search));

            filtered.forEach(item => {
                let status = item.stock <= 0 ? ['out-stock', 'Kosong'] : (item.stock <= 10 ? ['low-stock', 'Limit'] : ['in-stock', 'Tersedia']);
                
                body.innerHTML += `
                    <tr>
                        <td>
                            <div class="prod-info">
                                <img src="${item.img}" class="prod-img" onerror="this.src='https://placehold.co/100x100?text=No+Image'">
                                <span>${item.name}</span>
                            </div>
                        </td>
                        <td>${item.cat}</td>
                        <td>Rp ${item.price.toLocaleString()}</td>
                        <td>${item.stock}</td>
                        <td><span class="stock-badge ${status[0]}">${status[1]}</span></td>
                        <td>
                            <button class="btn-icon" onclick="editData(${item.id})"><i class="fa-solid fa-edit"></i></button>
                            <button class="btn-icon" style="color:#ef4444" onclick="deleteData(${item.id})"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function openModal(mode) {
            document.getElementById('modalOverlay').style.display = 'flex';
            if(mode === 'add') {
                document.getElementById('editId').value = '';
                document.getElementById('modalTitle').innerText = 'Tambah Produk';
                document.querySelectorAll('.modal input').forEach(i => i.value = '');
            }
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        function useTemplate() {
            document.getElementById('prodName').value = "Chocolate Muffin";
            document.getElementById('prodCat').value = "Makanan";
            document.getElementById('prodPrice').value = "15000";
            document.getElementById('prodStock').value = "20";
            document.getElementById('prodImg').value = "https://images.unsplash.com/photo-1586201375761-83865001e31c?w=200&fit=crop";
        }

        function saveData() {
            const id = document.getElementById('editId').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('prodName').value,
                cat: document.getElementById('prodCat').value,
                price: parseInt(document.getElementById('prodPrice').value) || 0,
                stock: parseInt(document.getElementById('prodStock').value) || 0,
                img: document.getElementById('prodImg').value || 'https://placehold.co/100x100?text=Produk'
            };

            if(id) {
                const idx = inventory.findIndex(i => i.id == id);
                inventory[idx] = data;
            } else {
                inventory.push(data);
            }
            renderTable();
            closeModal();
        }

        function editData(id) {
            const item = inventory.find(i => i.id == id);
            document.getElementById('editId').value = item.id;
            document.getElementById('prodName').value = item.name;
            document.getElementById('prodCat').value = item.cat;
            document.getElementById('prodPrice').value = item.price;
            document.getElementById('prodStock').value = item.stock;
            document.getElementById('prodImg').value = item.img;
            document.getElementById('modalTitle').innerText = 'Edit Produk';
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function deleteData(id) {
            inventory = inventory.filter(i => i.id !== id);
            renderTable();
        }

        renderTable();
    </script>
</body>
</html>
