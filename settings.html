<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: #e5e7eb; 
            border-radius: 10px; 
            border: 2px solid transparent;
            background-clip: content-box;
        }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; background-clip: content-box; }

        body { 
            background: transparent; 
            padding: 20px; 
            color: #1f2937;
            /* Memastikan body bisa di-scroll jika konten panjang */
            height: 100vh;
            overflow-y: auto;
        }
        @media (min-width: 768px) { body { padding: 40px; } }

        .header-area {
            margin-bottom: 30px;
        }

        h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }

        .settings-container {
            background: #fff;
            border-radius: 28px;
            border: 1px solid #f3f4f6;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            max-width: 900px; /* Batasan lebar agar tidak terlalu melebar di layar lebar */
            margin: 0 auto;
        }

        /* CONTENT FULL WIDTH */
        .settings-content { padding: 30px; }
        @media (min-width: 768px) { .settings-content { padding: 40px; } }

        .section-header { margin-bottom: 30px; }
        .section-header h2 { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .section-header p { font-size: 14px; color: #6b7280; margin-top: 5px; }

        /* LOGO UPLOAD PREVIEW */
        .logo-preview-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 35px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 20px;
            border: 2px dashed #e5e7eb;
        }
        .current-logo {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            object-fit: cover;
            background: #fff;
            border: 1px solid #eee;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 640px) { .form-grid { grid-template-columns: 1fr 1fr; } }

        .form-group.full { grid-column: 1 / -1; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            outline: none;
            font-size: 14px;
            font-weight: 600;
            background: #fff;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus { 
            border-color: #6366f1; 
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); 
        }

        .btn-save {
            background: #6366f1;
            color: #fff;
            padding: 14px 35px;
            border-radius: 14px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
            width: 100%;
        }
        @media (min-width: 640px) { .btn-save { width: auto; } }
        
        .btn-save:hover { background: #4f46e5; transform: translateY(-2px); }

        /* TOAST NOTIFICATION */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #111827; color: #fff; padding: 12px 25px; border-radius: 50px;
            font-size: 13px; font-weight: 700; display: none; z-index: 1000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>Konfigurasi</h1>
    </div>

    <div class="settings-container">
        <div class="settings-content">
            <div class="section-header">
                <h2><i class="fa-solid fa-shop" style="color: #6366f1;"></i> Profil Toko</h2>
                <p>Kelola identitas publik dan informasi operasional bisnis Anda.</p>
            </div>

            <div class="logo-preview-area">
                <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?w=150&h=150&fit=crop" class="current-logo" id="logoPreview">
                <div>
                    <label>Logo Toko</label>
                    <button onclick="document.getElementById('fileInput').click()" style="background: #fff; border: 1px solid #e5e7eb; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;">Ganti Logo</button>
                    <input type="file" id="fileInput" style="display: none;" onchange="previewImage(this)">
                </div>
            </div>
            
            <div class="form-grid">
                <div class="form-group full">
                    <label>Nama Entitas Bisnis</label>
                    <input type="text" value="Stora Coffee & Roastery">
                </div>

                <div class="form-group">
                    <label>Email Administrator</label>
                    <input type="email" value="admin@stora.io">
                </div>

                <div class="form-group">
                    <label>WhatsApp Toko</label>
                    <input type="text" value="+62 812-3456-7890">
                </div>

                <div class="form-group">
                    <label>Mata Uang</label>
                    <select>
                        <option>IDR - Rupiah Indonesia</option>
                        <option>USD - US Dollar</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Zona Waktu</label>
                    <select>
                        <option>(GMT+07:00) Jakarta</option>
                        <option>(GMT+08:00) Makassar</option>
                        <option>(GMT+09:00) Jayapura</option>
                    </select>
                </div>

                <div class="form-group full">
                    <label>Alamat Lengkap</label>
                    <textarea rows="3">Jl. Senopati No. 12, Jakarta Selatan, DKI Jakarta</textarea>
                </div>
            </div>

            <button class="btn-save" onclick="showToast()">Simpan Perubahan</button>
        </div>
    </div>

    <div id="toast">Berhasil disimpan, Bos! 🚀</div>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('logoPreview').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>

</body>
</html>
