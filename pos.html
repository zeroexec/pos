<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM POS | Minimal Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --sidebar-gradient: linear-gradient(165deg, #4f46e5 0%, #7c3aed 100%);
            --main-bg: #f3f4f6;
            --glass-white: rgba(255, 255, 255, 0.85);
            --card-radius: 28px;
            --item-radius: 16px;
        }

        body {
            background-color: var(--main-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.12) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            overflow: hidden;
            padding: 20px;
        }

        /* SIDEBAR DESKTOP */
        .sidebar {
            width: 260px;
            background: var(--sidebar-gradient);
            display: flex;
            flex-direction: column;
            border-radius: var(--card-radius);
            box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.25);
            margin-right: 20px;
            padding: 30px 20px;
            flex-shrink: 0;
            z-index: 10;
        }

        .brand {
            padding: 10px 10px 40px;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 32px; height: 32px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        .nav-group { flex: 1; }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            transition: 0.3s;
            border-radius: var(--item-radius);
            gap: 12px;
        }

        .nav-item i { font-size: 18px; width: 20px; text-align: center; }

        .nav-item:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }

        .nav-item.active {
            color: #4f46e5;
            background: #fff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        /* IFRAME WRAPPER */
        .iframe-wrapper {
            flex: 1;
            background: var(--glass-white);
            backdrop-filter: blur(25px);
            border-radius: var(--card-radius);
            border: 1px solid rgba(255, 255, 255, 0.6);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.03);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .sidebar-footer {
            margin-top: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 18px 15px;
            border-radius: var(--item-radius);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: #fff;
            color: #6366f1;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
        }

        .user-info { text-align: left; }

        /* RESPONSIVE MODE (MOBILE) */
        @media (max-width: 768px) {
            body { padding: 0; flex-direction: column; }
            .sidebar {
                position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
                flex-direction: row; margin-right: 0; border-radius: 0; padding: 0 10px;
                justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            }
            .brand, .sidebar-footer { display: none; }
            .nav-group { display: flex; width: 100%; justify-content: space-around; height: 100%; align-items: center; }
            .nav-item { margin-bottom: 0; padding: 10px; flex-direction: column; gap: 4px; font-size: 10px; color: rgba(255, 255, 255, 0.6); border-radius: 12px; flex: 1; text-align: center; }
            .nav-item i { font-size: 20px; }
            .nav-item.active { background: transparent; color: #fff; box-shadow: none; }
            .nav-item.active i { background: #fff; color: #6366f1; padding: 8px; border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; }
            .iframe-wrapper { border-radius: 0; border: none; height: calc(100vh - 70px); margin-bottom: 70px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-bolt"></i></div>
            SISTEM POS
        </div>
        
        <div class="nav-group">
            <a href="dashboard_home.html" target="contentFrame" class="nav-item active" onclick="setActive(this)">
                <i class="fa-solid fa-house"></i>
                <span>Beranda</span>
            </a>
            <a href="inventory.html" target="contentFrame" class="nav-item" onclick="setActive(this)">
                <i class="fa-solid fa-box"></i>
                <span>Stok</span>
            </a>
            <a href="transactions.html" target="contentFrame" class="nav-item" onclick="setActive(this)">
                <i class="fa-solid fa-cash-register"></i>
                <span>Kasir</span>
            </a>
            <a href="settings.html" target="contentFrame" class="nav-item" onclick="setActive(this)">
                <i class="fa-solid fa-gear"></i>
                <span>Setting</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="user-avatar">AM</div>
            <div class="user-info">
                <p style="font-size: 12px; font-weight: 800; color: #fff; line-height: 1.2;">Adlan Madjied Ridho</p>
                <p style="font-size: 10px; color: #4ade80; font-weight: 700;">
                    <i class="fa-solid fa-circle" style="font-size: 6px; vertical-align: middle;"></i> Active
                </p>
            </div>
        </div>
    </aside>

    <div class="iframe-wrapper">
        <iframe name="contentFrame" src="dashboard_home.html"></iframe>
    </div>

    <script>
        function setActive(element) {
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
