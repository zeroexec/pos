<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }

        body { background: transparent; padding: 20px; color: #1f2937; height: 100vh; overflow: hidden; }

        .pos-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        @media (min-width: 1024px) {
            .pos-container { grid-template-columns: 1fr 380px; }
        }

        /* LEFT SIDE: PRODUCTS */
        .product-section { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding-right: 5px; }

        .category-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 12px 24px; background: #fff; border-radius: 14px;
            font-size: 13px; font-weight: 700; color: #6b7280;
            white-space: nowrap; cursor: pointer; border: 1px solid #f3f4f6; transition: 0.3s;
        }
        .tab.active { background: #6366f1; color: #fff; border-color: #6366f1; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        .product-card {
            background: #fff; border-radius: 24px; padding: 12px;
            border: 1px solid #f3f4f6; cursor: pointer; transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); border-color: #6366f1; box-shadow: 0 10px 20px rgba(99,102,241,0.05); }
        .product-card img { width: 100%; aspect-ratio: 1/1; border-radius: 18px; object-fit: cover; margin-bottom: 10px; }
        .product-card h4 { font-size: 14px; font-weight: 700; color: #111827; }
        .product-card span { font-size: 13px; font-weight: 800; color: #6366f1; }

        /* RIGHT SIDE: BILLING */
        .billing-section {
            background: #fff; border-radius: 28px; padding: 25px;
            display: flex; flex-direction: column; border: 1px solid #f3f4f6; height: 100%;
        }

        .cart-list { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9fafb; }
        .cart-item img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        .item-info { flex: 1; }
        .item-info h5 { font-size: 13px; font-weight: 700; }
        .item-info p { font-size: 12px; color: #6366f1; font-weight: 800; }

        .qty-controls { display: flex; align-items: center; gap: 8px; background: #f3f4f6; padding: 4px 8px; border-radius: 8px; }
        .qty-btn { border: none; background: none; cursor: pointer; color: #6366f1; font-size: 10px; }

        .cart-total { border-top: 2px dashed #f3f4f6; padding-top: 15px; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; font-weight: 600; color: #6b7280; }
        .grand-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: 800; color: #111827; margin: 10px 0; }

        .btn-pay {
            background: #6366f1; color: #fff; width: 100%; padding: 18px;
            border-radius: 18px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        /* PAYMENT MODAL */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            display:none; align-items:center; justify-content:center; z-index:100;
        }
        .modal { background:#fff; width:90%; max-width:400px; padding:30px; border-radius:28px; }
        .cash-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin: 15px 0; }
        .cash-tag { 
            background:#f3f4f6; padding:10px; border-radius:12px; text-align:center; 
            font-size:12px; font-weight:700; cursor:pointer; transition:0.2s;
        }
        .cash-tag:hover { background:#6366f1; color:#fff; }
        
        .input-payment {
            width:100%; padding:15px; border-radius:14px; border:2px solid #f3f4f6;
            font-size:20px; font-weight:800; text-align:right; outline:none;
        }
        .change-display {
            background:#f0fdf4; padding:15px; border-radius:14px; margin-top:15px;
            display:flex; justify-content:space-between; align-items:center;
        }

        /* SUCCESS STATE */
        .success-box { text-align:center; display:none; }
        .success-box i { font-size:50px; color:#10b981; margin-bottom:15px; }
    </style>
</head>
<body>

    <div class="pos-container">
        <div class="product-section">
            <div class="category-tabs">
                <div class="tab active" onclick="filterCat('all')">Semua Menu</div>
                <div class="tab" onclick="filterCat('Coffee')">Coffee</div>
                <div class="tab" onclick="filterCat('Non-Coffee')">Non-Coffee</div>
                <div class="tab" onclick="filterCat('Food')">Food</div>
            </div>
            <div class="product-grid" id="productGrid"></div>
        </div>

        <div class="billing-section">
            <h3 style="margin-bottom:20px; font-weight:800;">Tagihan</h3>
            <div class="cart-list" id="cartList"></div>

            <div class="cart-total">
                <div class="total-row"><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
                <div class="total-row"><span>Pajak (10%)</span><span id="tax">Rp 0</span></div>
                <div class="grand-total"><span>TOTAL</span><span id="total">Rp 0</span></div>
            </div>
            <button class="btn-pay" onclick="openPayment()">PROSES PEMBAYARAN</button>
        </div>
    </div>

    <div class="modal-overlay" id="paymentModal">
        <div class="modal" id="modalContent">
            <h3 style="margin-bottom:20px; text-align:center;">Pembayaran Tunai</h3>
            
            <label style="font-size:11px; font-weight:800; color:#9ca3af; text-transform:uppercase;">Uang Diterima</label>
            <input type="number" class="input-payment" id="cashInput" placeholder="0" oninput="calcChange()">

            <div class="cash-grid">
                <div class="cash-tag" onclick="setCash(20000)">20k</div>
                <div class="cash-tag" onclick="setCash(50000)">50k</div>
                <div class="cash-tag" onclick="setCash(10000) ">10k</div>
                <div class="cash-tag" onclick="setCash(100000)">100k</div>
                <div class="cash-tag" onclick="setCash(75000)">75k</div>
                <div class="cash-tag" onclick="setCash('exact')">Uang Pas</div>
            </div>

            <div class="change-display">
                <span style="font-size:13px; font-weight:700; color:#166534;">Kembalian</span>
                <span id="changeText" style="font-size:18px; font-weight:800; color:#166534;">Rp 0</span>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModal()" style="flex:1; padding:15px; border-radius:14px; border:none; font-weight:700; cursor:pointer;">Batal</button>
                <button onclick="finishOrder()" style="flex:1; padding:15px; border-radius:14px; border:none; background:#6366f1; color:#fff; font-weight:700; cursor:pointer;">Selesai</button>
            </div>
        </div>

        <div class="modal success-box" id="successBox">
            <i class="fa-solid fa-circle-check"></i>
            <h2>Transaksi Berhasil</h2>
            <p style="color:#6b7280; margin:10px 0 20px;">Pesanan sedang diproses.</p>
            <button onclick="resetAll()" style="width:100%; padding:15px; border-radius:14px; border:none; background:#6366f1; color:#fff; font-weight:700; cursor:pointer;">Lanjut Transaksi Baru</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Hot Americano', price: 20000, cat: 'Coffee', img: 'https://images.unsplash.com/photo-1551033406-611cf9a28f67?w=300' },
            { id: 2, name: 'Iced Cafe Latte', price: 28000, cat: 'Coffee', img: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300' },
            { id: 3, name: 'Choco Muffin', price: 15000, cat: 'Food', img: 'https://images.unsplash.com/photo-1586201375761-83865001e31c?w=300' },
            { id: 4, name: 'Strawberry Tea', price: 18000, cat: 'Non-Coffee', img: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=300' }
        ];

        let cart = [];
        let grandTotal = 0;

        function filterCat(c) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            const list = c === 'all' ? products : products.filter(p => p.cat === c);
            list.forEach(p => {
                grid.innerHTML += `<div class="product-card" onclick="addToCart(${p.id})"><img src="${p.img}"><h4>${p.name}</h4><span>Rp ${p.price.toLocaleString()}</span></div>`;
            });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const exist = cart.find(x => x.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty:1});
            renderCart();
        }

        function updateQty(id, d) {
            const i = cart.find(x => x.id === id);
            i.qty += d;
            if(i.qty < 1) cart = cart.filter(x => x.id !== id);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cartList');
            list.innerHTML = '';
            let sub = 0;
            cart.forEach(i => {
                sub += i.price * i.qty;
                list.innerHTML += `<div class="cart-item"><img src="${i.img}"><div class="item-info"><h5>${i.name}</h5><p>Rp ${(i.price*i.qty).toLocaleString()}</p></div><div class="qty-controls"><button class="qty-btn" onclick="updateQty(${i.id},-1)"><i class="fa-solid fa-minus"></i></button><span style="font-size:12px; font-weight:800;">${i.qty}</span><button class="qty-btn" onclick="updateQty(${i.id},1)"><i class="fa-solid fa-plus"></i></button></div></div>`;
            });
            const tax = sub * 0.1;
            grandTotal = sub + tax;
            document.getElementById('subtotal').innerText = 'Rp ' + sub.toLocaleString();
            document.getElementById('tax').innerText = 'Rp ' + tax.toLocaleString();
            document.getElementById('total').innerText = 'Rp ' + grandTotal.toLocaleString();
        }

        function openPayment() { if(cart.length > 0) document.getElementById('paymentModal').style.display='flex'; }
        function closeModal() { document.getElementById('paymentModal').style.display='none'; }

        function setCash(val) {
            if(val === 'exact') document.getElementById('cashInput').value = grandTotal;
            else document.getElementById('cashInput').value = val;
            calcChange();
        }

        function calcChange() {
            const input = document.getElementById('cashInput').value;
            const change = input - grandTotal;
            document.getElementById('changeText').innerText = change >= 0 ? 'Rp ' + change.toLocaleString() : 'Rp 0';
        }

        function finishOrder() {
            if(document.getElementById('cashInput').value < grandTotal) return;
            document.getElementById('modalContent').style.display='none';
            document.getElementById('successBox').style.display='block';
        }

        function resetAll() {
            cart = []; renderCart();
            document.getElementById('paymentModal').style.display='none';
            document.getElementById('modalContent').style.display='block';
            document.getElementById('successBox').style.display='none';
            document.getElementById('cashInput').value = '';
        }

        filterCat('all');
    </script>
</body>
</html>
